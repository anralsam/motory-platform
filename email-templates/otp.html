<!-- VOLD MOTOR — OTP / Verification email (premium enterprise template)
     Paste into: Supabase → Authentication → Email Templates → "Magic Link"
     Keep {{ .Token }} (the 6-digit code). Inline CSS + tables for email-client compatibility. -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
</head>
<body style="margin:0;padding:0;background:#f9fafb;font-family:'Tajawal',system-ui,-apple-system,'Segoe UI',Inter,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f9fafb;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <!-- ───────── White card ───────── -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;width:100%;background:#ffffff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:40px 36px 32px;text-align:center;">

              <!-- Logo -->
              <img src="https://www.voldmotor.com/logo.png" alt="VOLD MOTOR" width="150" style="display:block;width:150px;max-width:60%;height:auto;margin:0 auto 26px;border:0;">

              <!-- Greeting -->
              <h1 style="margin:0 0 6px;font-size:18px;font-weight:700;color:#111827;letter-spacing:-.01em;">مرحباً بك في VOLD MOTOR،</h1>

              <!-- Instruction -->
              <p style="margin:0 0 24px;font-size:15px;color:#6b7280;line-height:1.7;">رمز التحقق الخاص بك هو:</p>

              <!-- OTP container (hero) -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="background:#f8fafc;border:1px solid #eef2f7;border-radius:12px;padding:22px 16px;">
                    <span style="display:inline-block;font-family:'SF Mono',ui-monospace,'Menlo','Consolas',monospace;font-size:36px;font-weight:800;letter-spacing:12px;color:#0f172a;direction:ltr;padding-right:12px;">{{ .Token }}</span>
                  </td>
                </tr>
              </table>

              <!-- Security notice -->
              <p style="margin:24px 0 0;font-size:13px;color:#9ca3af;line-height:1.8;">
                هذا الرمز صالح لفترة قصيرة. يُرجى عدم مشاركته مع أي شخص. إذا لم تطلب هذا الرمز، يمكنك تجاهل هذه الرسالة بأمان.
              </p>

            </td>
          </tr>
        </table>

        <!-- ───────── Footer (outside the card) ───────── -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;width:100%;">
          <tr>
            <td align="center" style="padding:22px 16px 4px;">
              <p style="margin:0 0 6px;font-size:12px;color:#9ca3af;line-height:1.6;">© 2026 VOLD MOTOR. جميع الحقوق محفوظة.</p>
              <a href="https://www.voldmotor.com/contact.html" style="font-size:12px;color:#9ca3af;text-decoration:underline;">الدعم الفني</a>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
