<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الخدمات والأسعار — VOLD MOTOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.svc-card{background:var(--paper);border:1.5px solid var(--line);border-radius:18px;overflow:hidden}
.svc-table{width:100%;border-collapse:collapse;font-size:.92rem}
.svc-table th{text-align:right;font-size:.76rem;font-weight:800;color:var(--muted);padding:13px 16px;background:var(--lilac);border-bottom:1.5px solid var(--line);white-space:nowrap}
.svc-table td{padding:12px 16px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:middle}
.svc-table tr:last-child td{border-bottom:0}
.svc-name{font-weight:800}
.price-inp{width:110px;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:.92rem;font-weight:800;color:var(--ink);background:var(--lilac);outline:0;text-align:center;direction:ltr}
.price-inp:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.svc-del{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);background:var(--paper);display:grid;place-items:center;cursor:pointer;color:var(--muted)}
.svc-del:hover{border-color:#ef4444;color:#ef4444}
.tg{position:relative;display:inline-block;width:42px;height:23px}
.tg input{opacity:0;width:0;height:0}
.tg .sl{position:absolute;inset:0;background:var(--line);border-radius:20px;transition:.2s;cursor:pointer}
.tg .sl::before{content:'';position:absolute;width:17px;height:17px;border-radius:50%;background:#fff;top:3px;inset-inline-start:3px;transition:.2s}
.tg input:checked + .sl{background:var(--green)}
.tg input:checked + .sl::before{transform:translateX(-19px)}
.type-pick{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:16px}
.type-btn{background:var(--lilac);border:1.5px solid var(--line);border-radius:12px;padding:12px 18px;font-family:inherit;font-weight:800;font-size:.9rem;color:var(--ink);cursor:pointer;transition:.15s}
.type-btn:hover{border-color:var(--violet);color:var(--violet)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,19,64,.45);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--paper);border-radius:22px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0}
.modal-head h3{font-size:1.18rem;font-weight:700;color:var(--ink)}
.modal-close{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--line);background:var(--paper);display:grid;place-items:center;cursor:pointer;color:var(--muted)}
.modal-body{padding:20px 24px 24px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-group label{font-size:.83rem;font-weight:800;color:var(--muted)}
.form-group input{padding:12px 14px;border-radius:11px;border:1.5px solid var(--line);background:var(--lilac);font-family:inherit;font-size:.93rem;font-weight:600;color:var(--ink);width:100%;box-sizing:border-box;min-height:44px}
.form-group input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state svg{margin:0 auto 14px;display:block;opacity:.35}
.empty-state h3{font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.save-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 24px;border-radius:12px;font-size:.9rem;font-weight:700;transition:transform .3s;z-index:999}
.save-toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.price-inp{width:84px}.svc-table th,.svc-table td{padding:11px 10px;font-size:.84rem}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="center-types.js"></script>
<script src="supabase-client.js"></script>
<script src="lang.js" defer></script>
</head>
<body>
<div class="app-layout">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo" style="display:flex;align-items:center;gap:9px;direction:ltr;justify-content:flex-start">
    <svg width="30" height="30" viewBox="0 0 64 64" fill="none" aria-hidden="true" style="flex:none"><defs><linearGradient id="sbg" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#1e3a8a"/><stop offset="1" stop-color="#2563eb"/></linearGradient><linearGradient id="sbs" x1="32" y1="14" x2="32" y2="50" gradientUnits="userSpaceOnUse"><stop stop-color="#f1f5f9"/><stop offset=".5" stop-color="#cbd5e1"/><stop offset="1" stop-color="#94a3b8"/></linearGradient></defs><circle cx="32" cy="32" r="23" fill="none" stroke="url(#sbg)" stroke-width="9" stroke-dasharray="7 5.6"/><circle cx="32" cy="32" r="17.5" fill="none" stroke="url(#sbg)" stroke-width="3"/><rect x="29.5" y="30" width="5" height="17" rx="2.2" fill="url(#sbs)"/><circle cx="32" cy="46.5" r="3.1" fill="url(#sbs)"/><rect x="25" y="15" width="14" height="15" rx="2.5" fill="url(#sbs)"/><rect x="25" y="19" width="14" height="1.5" fill="#94a3b8" opacity=".6"/><rect x="25" y="22.4" width="14" height="1.5" fill="#94a3b8" opacity=".6"/></svg>
    <span style="display:inline-flex;align-items:center;gap:.35em;line-height:1"><span style="font-weight:800;font-size:1.12rem;letter-spacing:.02em;color:var(--ink)">VOLD</span><span style="font-weight:300;font-size:1.12rem;letter-spacing:.16em;color:var(--ink)">MOTOR</span></span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <a href="dashboard.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> <span>لوحة التحكم</span></a>
      <a href="services.html" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94z"/></svg> <span>الخدمات والأسعار</span></a>
      <a href="customers.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> <span>العملاء</span></a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">الإدارة</div>
      <a href="reports.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg> <span>التقارير</span></a>
      <a href="team.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> <span>الفريق</span></a>
      <a href="settings.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> <span>الإعدادات</span></a>
    </div>
  </nav>
  <div class="sidebar-user">
    <div class="avatar" style="background:#2563eb" id="sb-avatar">م</div>
    <div class="info"><b id="sb-name">جاري...</b><span>VOLD MOTOR</span></div>
    <a href="#" onclick="doLogout();return false;" title="خروج"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7a7875" stroke-width="2.2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a>
  </div>
</aside>

<div class="main-area">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="burger-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <a href="dashboard.html" class="back-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> <span>العودة</span></a>
      <span class="topbar-title">الخدمات والأسعار</span>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-violet btn-sm" onclick="openAddModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>إضافة خدمة</span>
      </button>
    </div>
  </div>

  <div class="page-content">
    <div class="svc-card fade-in" id="svc-card">
      <div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>
    </div>
  </div>
</div>
</div>

<!-- Add service modal -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-head"><h3>إضافة خدمة جديدة</h3><button class="modal-close" onclick="closeModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div id="svc-err" style="display:none;background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c;border-radius:10px;padding:10px 13px;font-size:.85rem;font-weight:700;margin-bottom:12px"></div>
      <div class="form-group"><label>اسم الخدمة *</label><input type="text" id="s-name" placeholder="مثال: تغيير زيت مكينة سوبر"></div>
      <div class="form-group"><label>السعر (ر.س) *</label><input type="number" id="s-price" min="0" step="1" placeholder="0" style="direction:ltr;text-align:right"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-violet" id="s-save" onclick="addService(this)">حفظ الخدمة</button>
      </div>
    </div>
  </div>
</div>
<div class="save-toast" id="toast">✅ تم الحفظ</div>

<script>
const _sb = window._supabase;
let MERCHANT_ID, SERVICES = [], _MYTYPE = 'أخرى';   // center type → distinct services path

async function requireAuth(){ const {data:{session}}=await _sb.auth.getSession(); if(!session){location.href='login.html?mode=login';return null;} return session; }
function doLogout(){ _sb.auth.signOut().then(()=>location.href='login.html?mode=login'); }
function showToast(msg='✅ تم الحفظ'){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function loadServices(){
  try{ const {data,error}=await _sb.from('services').select('*').eq('merchant_id',MERCHANT_ID).order('id',{ascending:true}); if(error)throw error; SERVICES=data||[]; }
  catch(e){ SERVICES=[]; }
  render();
}

function render(){
  const card=document.getElementById('svc-card');
  if(!SERVICES.length){
    card.innerHTML=`<div class="empty-state">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94z"/></svg>
      <h3>لا توجد خدمات بعد</h3>
      <p style="font-size:.9rem">نوع مركزك: <b style="color:var(--ink)">${esc(_MYTYPE)}</b> — حمّل الخدمات الافتراضية المناسبة لنوعك، أو أضف خدمة يدوياً</p>
      <div class="type-pick"><button class="type-btn" style="background:var(--violet);color:#fff;border-color:var(--violet)" onclick="seedDefaults('${esc(_MYTYPE)}',this)">تحميل خدمات «${esc(_MYTYPE)}»</button></div>
      <p style="font-size:.78rem;color:var(--muted);margin-top:12px">أو اختر نوعاً آخر:</p>
      <div class="type-pick">${(window.VM_TYPE_LABELS||[]).filter(t=>t!==_MYTYPE).map(t=>`<button class="type-btn" onclick="seedDefaults('${esc(t)}',this)">${esc(t)}</button>`).join('')}</div>
    </div>`;
    return;
  }
  const rows=SERVICES.map(s=>`<tr>
    <td><span class="svc-name">${esc(s.service_name)}</span></td>
    <td><input class="price-inp" type="number" min="0" value="${Number(s.cost)||0}" onchange="updatePrice(${s.id}, this.value)"> <span style="color:var(--muted);font-size:.8rem">ر.س</span></td>
    <td><label class="tg"><input type="checkbox" ${s.is_active!==false?'checked':''} onchange="toggleActive(${s.id}, this.checked)"><span class="sl"></span></label></td>
    <td><button class="svc-del" onclick="deleteService(${s.id})" title="حذف"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button></td>
  </tr>`).join('');
  card.innerHTML=`<div style="overflow-x:auto"><table class="svc-table"><thead><tr><th>الخدمة</th><th>السعر</th><th>مفعّلة</th><th>حذف</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

async function seedDefaults(typeLabel, btn){
  const cat = window.vmTypeCatalog ? window.vmTypeCatalog(typeLabel) : null;
  if(!cat || !cat.services) return;
  const o=btn.textContent; btn.disabled=true; btn.textContent='جاري التحميل...';
  try{
    const rows=cat.services.map(s=>({ merchant_id:MERCHANT_ID, service_name:s.name, cost:s.price, is_active:true }));
    const {error}=await _sb.from('services').insert(rows);
    if(error)throw error;
    showToast('✅ تم تحميل خدمات «'+typeLabel+'»');
    await loadServices();
  }catch(e){ btn.disabled=false; btn.textContent=o; showToast('تعذّر التحميل: '+(e.message||'')); }
}

function openAddModal(){ document.getElementById('svc-err').style.display='none'; document.getElementById('s-name').value=''; document.getElementById('s-price').value=''; document.getElementById('addModal').classList.add('open'); setTimeout(()=>document.getElementById('s-name').focus(),120); }
function closeModal(){ document.getElementById('addModal').classList.remove('open'); }

async function addService(btn){
  const err=document.getElementById('svc-err'); err.style.display='none';
  const name=document.getElementById('s-name').value.trim();
  const price=parseFloat(document.getElementById('s-price').value);
  if(!name){ err.textContent='أدخل اسم الخدمة'; err.style.display='block'; return; }
  if(isNaN(price)||price<0){ err.textContent='أدخل سعراً صحيحاً'; err.style.display='block'; return; }
  btn.disabled=true; const o=btn.textContent; btn.textContent='جاري الحفظ...';
  try{
    const {error}=await _sb.from('services').insert({ merchant_id:MERCHANT_ID, service_name:name, cost:price, is_active:true });
    if(error)throw error;
    closeModal(); showToast('✅ تمت إضافة الخدمة'); await loadServices();
  }catch(e){ err.textContent='تعذّر الحفظ: '+(e.message||''); err.style.display='block'; }
  finally{ btn.disabled=false; btn.textContent=o; }
}

async function updatePrice(id, val){
  const price=parseFloat(val); if(isNaN(price)||price<0){ showToast('سعر غير صحيح'); return; }
  try{ const {error}=await _sb.from('services').update({cost:price}).eq('id',id); if(error)throw error; showToast('✅ تم تحديث السعر'); }
  catch(e){ showToast('تعذّر التحديث'); }
}
async function toggleActive(id, active){
  try{ const {error}=await _sb.from('services').update({is_active:active}).eq('id',id); if(error)throw error; showToast(active?'✅ مفعّلة':'⏸️ متوقفة'); }
  catch(e){ showToast('تعذّر التحديث'); }
}
async function deleteService(id){
  if(!confirm('حذف هذه الخدمة؟')) return;
  try{ const {error}=await _sb.from('services').delete().eq('id',id); if(error)throw error; showToast('🗑️ تم الحذف'); await loadServices(); }
  catch(e){ showToast('تعذّر الحذف'); }
}

document.getElementById('addModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });

(async()=>{
  const session=await requireAuth(); if(!session) return;
  MERCHANT_ID=session.user.id;
  const meta=session.user.user_metadata||{};
  _MYTYPE = meta.center_type || (window.vmClassify ? window.vmClassify(meta.services) : 'أخرى');
  const name=meta.shop_name||meta.center_name||session.user.email||'';
  document.getElementById('sb-name').textContent=name;
  document.getElementById('sb-avatar').textContent=(name.charAt(0)||'م');
  loadServices();
})();
</script>
<script src="mobile-init.js"></script>
  <script src="brand.js"></script>
</body>
</html>
