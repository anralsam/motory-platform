<style>
/* تبديل العرض */
.view-tabs{display:flex;gap:6px;background:var(--bg);border-radius:10px;padding:4px}
.view-tab{padding:9px 18px;border-radius:8px;border:0;background:none;font-family:inherit;font-weight:800;font-size:.88rem;color:var(--muted);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;min-height:40px}
.view-tab.active{background:var(--lilac);color:var(--violet);box-shadow:var(--shadow-xs)}

/* تنقل التاريخ */
.date-nav{display:flex;align-items:center;gap:14px}
.date-nav-btn{width:42px;height:42px;border-radius:10px;border:1.5px solid var(--line);background:var(--paper);display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:.15s;flex:none}
.date-nav-btn:hover{border-color:var(--violet);color:var(--violet)}
.date-label{font-weight:900;font-size:1.05rem;color:var(--ink);min-width:160px;text-align:center}

/* عرض اليوم */
.day-view{display:grid;grid-template-columns:60px 1fr;gap:0}
.time-col{display:flex;flex-direction:column}
.time-slot{height:72px;display:flex;align-items:flex-start;padding-top:6px;font-size:.78rem;font-weight:700;color:var(--muted);border-top:1px solid transparent;flex:none}
.appt-col{position:relative;border-right:1px solid var(--line)}
.appt-hour-line{height:72px;border-top:1px solid var(--line);position:relative}
.appt-hour-line.now-line::before{content:'';position:absolute;top:0;right:-4px;left:0;border-top:2px solid var(--violet);z-index:2}
.appt-hour-line.now-line::after{content:'';position:absolute;top:-4px;right:-7px;width:8px;height:8px;background:var(--violet);border-radius:50%;z-index:2}

.appt-block{position:absolute;right:8px;left:8px;border-radius:10px;padding:8px 12px;cursor:pointer;transition:.15s;overflow:hidden;z-index:1}
.appt-block:hover{filter:brightness(.95);transform:translateX(-2px)}
.appt-block .ab-service{font-weight:900;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appt-block .ab-customer{font-size:.8rem;margin-top:2px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appt-block .ab-time{font-size:.76rem;margin-top:2px;opacity:.7}

/* عرض الأسبوع */
.week-view{overflow-x:auto}
.week-grid{display:grid;grid-template-columns:60px repeat(7,1fr);min-width:700px;gap:0}
.week-day-header{text-align:center;padding:10px 4px;font-weight:900;font-size:.88rem;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
.week-day-header.today{color:var(--violet)}
.week-day-header .wdh-num{font-size:1.2rem;font-weight:900;margin-bottom:2px}
.week-day-header.today .wdh-num{background:var(--violet);color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2px}
.week-cell{height:72px;border-top:1px solid var(--line);border-right:1px solid var(--line);padding:3px;position:relative}
.week-appt{border-radius:6px;padding:4px 7px;font-size:.76rem;font-weight:800;cursor:pointer;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.15s}
.week-appt:hover{filter:brightness(.92)}

/* بطاقة الحجز (قائمة) */
.appt-list{display:flex;flex-direction:column;gap:12px}
.appt-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:.18s}
.appt-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:transparent}
.appt-time-badge{min-width:68px;text-align:center;background:var(--violet-soft);border-radius:10px;padding:8px 10px;flex:none}
.appt-time-badge .atb-time{font-weight:900;font-size:1.05rem;color:var(--violet)}
.appt-time-badge .atb-dur{font-size:.76rem;color:var(--muted);margin-top:2px;font-weight:700}
.appt-info{flex:1;min-width:0}
.appt-info .ai-service{font-weight:900;font-size:1rem;color:var(--ink)}
.appt-info .ai-customer{font-size:.86rem;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px}
.appt-car-tag{font-size:.76rem;font-weight:800;background:var(--bg);color:var(--muted);padding:2px 8px;border-radius:6px;border:1px solid var(--line)}
.appt-card-actions{display:flex;gap:7px;flex:none}

/* الحجوزات المتأخرة */
.overdue-bar{background:var(--rose);border:1.5px solid #fca5a5;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.overdue-bar.hidden{display:none}

/* فلاتر الحالة */
.status-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.sf-btn{padding:7px 14px;border-radius:var(--radius-full);border:1.5px solid var(--line);background:var(--paper);font-family:inherit;font-weight:800;font-size:.85rem;color:var(--muted);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.sf-btn:hover,.sf-btn.active{border-color:currentColor}
.sf-btn.active{background:var(--lilac)}
.sf-all.active{color:var(--ink)}
.sf-pending.active{color:var(--yellow);border-color:var(--yellow);background:var(--amber)}
.sf-progress.active{color:var(--blue);border-color:var(--blue);background:var(--sky)}
.sf-done.active{color:var(--green);border-color:var(--green);background:var(--mint)}
.sf-cancel.active{color:var(--muted);border-color:var(--line)}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,19,64,.45);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--paper);border-radius:22px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0}
.modal-head h3{font-size:1.22rem;font-weight:700;color:var(--ink)}
.modal-close{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--line);background:var(--paper);display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:.15s}
.modal-close:hover{border-color:var(--ink);color:var(--ink)}
.modal-body{padding:20px 24px 24px}

/* تفاصيل الحجز */
.appt-detail-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
.appt-detail-row:last-of-type{border-bottom:0}
.adr-icon{width:32px;height:32px;border-radius:8px;background:var(--bg);display:grid;place-items:center;color:var(--muted);flex:none}
.adr-label{font-size:.82rem;font-weight:700;color:var(--muted)}
.adr-val{font-weight:800;color:var(--ink);margin-top:1px}

/* status dot */
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:5px}
.sdot-pending{background:var(--yellow)}
.sdot-progress{background:var(--blue)}
.sdot-done{background:var(--green)}
.sdot-cancel{background:#b0abc8}

@media(max-width:900px){
  .week-view{display:none}
  .date-label{min-width:120px;font-size:.95rem}
}
@media(max-width:600px){
  .appt-card{flex-wrap:wrap;gap:10px}
  .appt-card-actions{width:100%;justify-content:flex-end}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <div class="field"><label data-i18n="a.custOpt">اسم العميل (اختياري)</label><div class="inp-wrap"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><input type="text" id="newCustomer" placeholder="اسم العميل" data-i18n-ph="c.custNamePh"></div></div>
      </div>
      <div class="field"><label data-i18n="a.serviceReq">الخدمة *</label><div class="inp-wrap"><select id="newService"><option value="" data-i18n="a.chooseService">اختر الخدمة...</option><option value="wash" data-i18n="d.svc.wash">غسيل</option><option value="tint" data-i18n="d.svc.tint">تظليل</option><option value="polish" data-i18n="a.svcPolish">تلميع</option><option value="oil" data-i18n="d.svc.oil">تغيير زيت</option><option value="tire" data-i18n="a.svcTire">بناشر</option><option value="ceramic" data-i18n="d.svc.paint">حماية طلاء</option></select></div></div>
      <div class="field-row">
        <div class="field"><label data-i18n="a.date">التاريخ</label><div class="inp-wrap"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><input type="date" id="newDate"></div></div>
        <div class="field"><label data-i18n="a.time">الوقت</label><div class="inp-wrap"><svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><input type="time" id="newTime" value="09:00"></div></div>
      </div>
      <div class="field-row">
        <div class="field"><label data-i18n="a.duration">المدة المتوقعة</label><div class="inp-wrap"><select id="newDur"><option value="30" data-i18n="a.dur30">30 دقيقة</option><option value="60" selected data-i18n="a.dur60">ساعة</option><option value="90" data-i18n="a.dur90">ساعة ونص</option><option value="120" data-i18n="a.dur120">ساعتان</option><option value="180" data-i18n="a.dur180">3 ساعات</option></select></div></div>
        <div class="field"><label data-i18n="a.expectedCost">التكلفة المتوقعة (ر.س)</label><div class="inp-wrap"><input type="number" id="newPrice" placeholder="0" min="0"></div></div>
      </div>
      <div class="field"><label data-i18n="c.notes">ملاحظات</label><div class="inp-wrap"><textarea id="newNotes" placeholder="أي تفاصيل إضافية..." data-i18n-ph="a.notesPh"></textarea></div></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px">
        <button class="btn btn-ghost" onclick="document.getElementById('addModal').classList.remove('open')" data-i18n="c.cancel">إلغاء</button>
        <button class="btn btn-violet" onclick="saveAppointment()"><span data-i18n="a.saveBooking">حفظ الحجز</span></button>
      </div>
    </div>
  </div>
</div>

<!-- Modal تفاصيل الحجز -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="dtlTitle">—</h3>
      <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div id="dtlRows"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:18px" id="dtlActions"></div>
    </div>
  </div>
</div>

<script>
// ألوان الخدمات
const SERVICE_COLORS = {
  'تغيير الزيت والفلتر': {bg:'rgba(59,130,246,.13)', text:'#3b82f6'},
  'فحص شامل': {bg:'#dbeafe', text:'#1d6fd6'},
  'تبديل إطارات': {bg:'#d6f3e6', text:'#16a06a'},
  'فحص الفرامل': {bg:'#fee2e2', text:'#dc2626'},
  'غسيل وتلميع': {bg:'#fef3c7', text:'#d97706'},
  'صيانة دورية': {bg:'rgba(59,130,246,.13)', text:'#3b82f6'},
  'تغيير فلتر الهواء': {bg:'#dbeafe', text:'#1d6fd6'},
  'شحن بطارية': {bg:'#fef3c7', text:'#d97706'},
};
function svcColor(s){return SERVICE_COLORS[s]||{bg:'rgba(59,130,246,.08)',text:'#7a7875'}}

const STATUS_LABEL = {pending:'بانتظار', progress:'جارٍ', done:'مكتمل', cancel:'ملغي'};
const STATUS_BADGE = {
  pending:'<span class="badge badge-yellow">بانتظار</span>',
  progress:'<span class="badge badge-blue">جارٍ</span>',
  done:'<span class="badge badge-green">مكتمل</span>',
  cancel:'<span class="badge" style="background:var(--bg);color:var(--muted)">ملغي</span>',
};

// ── تسميات الخدمات ──────────────────────────────────────────────
const SVC_LABEL_MAP = {wash:'غسيل',tint:'تظليل',polish:'تلميع',oil:'تغيير زيت',tire:'بناشر',ceramic:'حماية طلاء'};

const today = new Date();
today.setHours(0,0,0,0);
function dStr(d){return d.toISOString().split('T')[0]}

let APPTS = []; // يُملأ من Supabase

async function loadAppts(){
  const uid = (await _sb.auth.getSession()).data.session?.user.id;
  const {data} = await _sb.from('visits')
    .select('id,service_type,plate,customer_name,phone,price,discount,notes,created_at,visit_number')
    .eq('merchant_id', uid)
    .order('created_at', {ascending:false});

  APPTS = (data||[]).map(t => {
    const dt = new Date(t.created_at);
    return {
      id:        t.id,
      customer:  t.customer_name || t.phone || '—',
      car:       t.plate || '—',
      service:   SVC_LABEL_MAP[t.service_type] || t.service_type || '—',
      date:      dStr(dt),
      time:      dt.toTimeString().slice(0,5),
      dur:       30,
      price:     (t.price || 0) - (t.discount || 0),
      status:    'done',
      notes:     t.notes || '',
      isPaid:    true,
    };
  });

  updateStatsBar();
  render();
}

function updateStatsBar(){
  const todayStr = dStr(today);
  const todayAppts = APPTS.filter(a=>a.date===todayStr);
  const rev = todayAppts.filter(a=>a.isPaid).reduce((s,a)=>s+Number(a.price),0);
  document.querySelector('.stats-row .stat-card:nth-child(1) .s-val').textContent = toAr(todayAppts.length);
  document.querySelector('.stats-row .stat-card:nth-child(2) .s-val').textContent = toAr(todayAppts.filter(a=>a.status==='progress').length);
  document.querySelector('.stats-row .stat-card:nth-child(3) .s-val').textContent = toAr(todayAppts.filter(a=>a.status==='done').length);
  document.querySelector('.stats-row .stat-card:nth-child(4) .s-val').textContent = toAr(Math.round(rev));
}

function toAr(n){return String(n).replace(/\d/g,d=>'0123456789'[d]);}

let currentView = 'list';
let currentDate = new Date(today);
let currentStatus = 'all';

function setView(v){
  currentView = v;
  ['list','day','week'].forEach(x=>document.getElementById('vt'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===v));
  updateDateLabel();
  render();
}

function navigate(dir){
  if(currentView==='week') currentDate.setDate(currentDate.getDate()+dir*7);
  else currentDate.setDate(currentDate.getDate()+dir);
  updateDateLabel();
  render();
}

function goToday(){
  currentDate = new Date(today);
  updateDateLabel();
  render();
}

const DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function updateDateLabel(){
  const el = document.getElementById('dateLabel');
  if(currentView==='week'){
    const start = getWeekStart(currentDate);
    const end = new Date(start); end.setDate(end.getDate()+6);
    el.textContent = `${start.getDate()} — ${end.getDate()} ${MONTHS_AR[end.getMonth()]}`;
  } else {
    const isToday = dStr(currentDate)===dStr(today);
    el.textContent = isToday ? `اليوم، ${currentDate.getDate()} ${MONTHS_AR[currentDate.getMonth()]}` : `${DAYS_AR[currentDate.getDay()]}، ${currentDate.getDate()} ${MONTHS_AR[currentDate.getMonth()]}`;
  }
}

function getWeekStart(d){
  const s = new Date(d);
  s.setDate(s.getDate() - s.getDay());
  return s;
}

function dayAppts(dateStr, statusFilter){
  return APPTS.filter(a => a.date===dateStr && (statusFilter==='all'||a.status===statusFilter));
}

function updateStatusCounts(dateStr){
  const appts = APPTS.filter(a=>a.date===dateStr);
  document.getElementById('sfAll').textContent = `(${appts.length})`;
  document.getElementById('sfPending').textContent = `(${appts.filter(a=>a.status==='pending').length})`;
  document.getElementById('sfProgress').textContent = `(${appts.filter(a=>a.status==='progress').length})`;
  document.getElementById('sfDone').textContent = `(${appts.filter(a=>a.status==='done').length})`;
  document.getElementById('sfCancel').textContent = `(${appts.filter(a=>a.status==='cancel').length})`;
}

function render(){
  const dateStr = dStr(currentDate);
  updateStatusCounts(dateStr);
  const appts = dayAppts(dateStr, currentStatus);
  const el = document.getElementById('viewContent');

  if(currentView==='list') renderList(el, appts);
  else if(currentView==='day') renderDay(el, appts);
  else renderWeek(el);
}

function renderList(el, appts){
  if(!appts.length){
    el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted)"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="margin:0 auto 14px;display:block;opacity:.4"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><p style="font-weight:800;font-size:1.1rem;color:var(--ink);margin-bottom:6px">لا توجد حجوزات</p><p style="font-size:.9rem">لا توجد حجوزات لهذا اليوم</p></div>';
    return;
  }
  el.innerHTML=`<div class="appt-list">${appts.sort((a,b)=>a.time.localeCompare(b.time)).map(a=>apptCard(a)).join('')}</div>`;
}

function apptCard(a){
  const c = svcColor(a.service);
  const durLabel = a.dur<60?`${a.dur}د`:a.dur===60?'ساعة':`${a.dur/60}س`;
  return `<div class="appt-card" onclick="openDetail(${a.id})">
    <div class="appt-time-badge">
      <div class="atb-time">${a.time}</div>
      <div class="atb-dur">${durLabel}</div>
    </div>
    <div style="width:4px;height:52px;border-radius:2px;background:${c.text};flex:none;border-radius:4px"></div>
    <div class="appt-info">
      <div class="ai-service">${a.service}</div>
      <div class="ai-customer">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${a.customer}
        <span class="appt-car-tag">${a.car}</span>
      </div>
    </div>
    <div style="text-align:left;flex:none">
      ${STATUS_BADGE[a.status]}
      <div style="font-weight:900;color:var(--violet);margin-top:6px;font-size:.93rem">${a.price} ر.س</div>
    </div>
    <div class="appt-card-actions">
      ${a.status==='pending'?`<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();changeStatus(${a.id},'progress')">بدء</button>`:''}
      ${a.status==='progress'?`<button class="btn btn-violet btn-sm" onclick="event.stopPropagation();changeStatus(${a.id},'done')">إنهاء</button>`:''}
    </div>
  </div>`;
}

function renderDay(el, appts){
  const hours = [];
  for(let h=7;h<=21;h++) hours.push(h);
  const nowHour = new Date().getHours();
  const isToday = dStr(currentDate)===dStr(today);

  let html = `<div style="background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden">
    <div class="day-view">
      <div class="time-col">
        <div style="height:40px;border-bottom:1px solid var(--line);background:var(--bg)"></div>
        ${hours.map(h=>`<div class="time-slot">${h}:00</div>`).join('')}
      </div>
      <div class="appt-col">
        <div style="height:40px;background:var(--bg);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 12px;font-weight:900;font-size:.9rem;color:var(--ink)">${dStr(currentDate)===dStr(today)?'اليوم':'يوم ' + DAYS_AR[currentDate.getDay()]}</div>`;

  hours.forEach(h=>{
    const isNow = isToday && h===nowHour;
    html += `<div class="appt-hour-line${isNow?' now-line':''}">`;
    appts.filter(a=>{
      const ah=parseInt(a.time.split(':')[0]);
      return ah===h;
    }).forEach(a=>{
      const c=svcColor(a.service);
      const mins=parseInt(a.time.split(':')[1]);
      const top=mins/60*72;
      const height=Math.max(36,(a.dur/60)*72-4);
      html+=`<div class="appt-block" style="top:${top}px;height:${height}px;background:${c.bg};color:${c.text}" onclick="openDetail(${a.id})">
        <div class="ab-service">${a.service}</div>
        <div class="ab-customer">${a.customer} · ${a.car}</div>
        <div class="ab-time">${a.time} · ${a.dur}د</div>
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`</div></div></div></div>`;
  el.innerHTML=html;
}

function renderWeek(el){
  const start = getWeekStart(currentDate);
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(start);d.setDate(d.getDate()+i);days.push(d);}

  let html=`<div class="week-view"><div class="week-grid">
    <div style="border-bottom:1px solid var(--line);border-right:1px solid var(--line);background:var(--bg)"></div>
    ${days.map(d=>{
      const isT=dStr(d)===dStr(today);
      return `<div class="week-day-header${isT?' today':''}">
        <div class="wdh-num">${d.getDate()}</div>
        <div style="font-size:.76rem">${DAYS_AR[d.getDay()]}</div>
      </div>`;
    }).join('')}`;

  const hours=[];for(let h=7;h<=20;h++)hours.push(h);
  hours.forEach(h=>{
    html+=`<div class="time-slot" style="border-top:1px solid var(--line);border-right:1px solid var(--line);padding:4px 6px">${h}:00</div>`;
    days.forEach(d=>{
      const ds=dStr(d);
      const ha=APPTS.filter(a=>a.date===ds&&parseInt(a.time.split(':')[0])===h);
      html+=`<div class="week-cell">${ha.map(a=>{
        const c=svcColor(a.service);
        return `<div class="week-appt" style="background:${c.bg};color:${c.text}" onclick="openDetail(${a.id})">${a.time} ${a.service}</div>`;
      }).join('')}</div>`;
    });
  });

  html+=`</div></div>`;
  el.innerHTML=html;
}

function openDetail(id){
  const a = APPTS.find(x=>x.id===id);
  if(!a)return;
  document.getElementById('dtlTitle').textContent=a.service;
  document.getElementById('dtlRows').innerHTML=`
    <div class="appt-detail-row"><div class="adr-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div><div class="adr-label">العميل</div><div class="adr-val">${a.customer}</div></div></div>
    <div class="appt-detail-row"><div class="adr-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M19 17H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2z"/><circle cx="7.5" cy="17" r="1.5"/><circle cx="16.5" cy="17" r="1.5"/></svg></div><div><div class="adr-label">السيارة</div><div class="adr-val">${a.car}</div></div></div>
    <div class="appt-detail-row"><div class="adr-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><div><div class="adr-label">الوقت والمدة</div><div class="adr-val">${a.time} · ${a.dur} دقيقة</div></div></div>
    <div class="appt-detail-row"><div class="adr-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div><div class="adr-label">التكلفة</div><div class="adr-val" style="color:var(--violet)">${a.price} ر.س</div></div></div>
    <div class="appt-detail-row"><div class="adr-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div><div class="adr-label">الحالة</div><div class="adr-val">${STATUS_BADGE[a.status]}</div></div></div>
    ${a.notes?`<div class="appt-detail-row"><div class="adr-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div><div class="adr-label">ملاحظات</div><div class="adr-val">${a.notes}</div></div></div>`:''}
  `;
  let actions = `<button class="btn btn-ghost btn-sm" onclick="document.getElementById('detailModal').classList.remove('open')">إغلاق</button>`;
  if(a.status==='pending') actions+=`<button class="btn btn-violet btn-sm" onclick="changeStatus(${a.id},'progress');document.getElementById('detailModal').classList.remove('open')">بدء التنفيذ</button>`;
  if(a.status==='progress') actions+=`<button class="btn btn-violet btn-sm" onclick="changeStatus(${a.id},'done');document.getElementById('detailModal').classList.remove('open')">تأكيد الإنهاء</button>`;
  if(a.status!=='cancel'&&a.status!=='done') actions+=`<button class="btn btn-ghost btn-sm" style="color:var(--red);border-color:var(--red)" onclick="changeStatus(${a.id},'cancel');document.getElementById('detailModal').classList.remove('open')">إلغاء</button>`;
  document.getElementById('dtlActions').innerHTML=actions;
  document.getElementById('detailModal').classList.add('open');
}

async function changeStatus(id,status){
  // visits are completed records — update local UI state only
  const a=APPTS.find(x=>x.id===id);
  if(a) a.status=status;
  updateStatsBar();
  render();
}

function openAddModal(){
  const d=document.getElementById('newDate');
  d.value=dStr(currentDate);
  document.getElementById('addModal').classList.add('open');
}

async function saveAppointment(){
  const service=document.getElementById('newService').value;
  const date=document.getElementById('newDate').value;
  const time=document.getElementById('newTime').value;
  const price=parseFloat(document.getElementById('newPrice').value)||0;
  const notes=document.getElementById('newNotes').value.trim();
  const plate=document.getElementById('newCar').value.trim().toUpperCase();
  const custName=document.getElementById('newCustomer').value.trim();
  if(!plate||!service||!date||!time){alert('الرجاء تعبئة اللوحة والخدمة والتاريخ والوقت');return;}

  const uid=(await _sb.auth.getSession()).data.session?.user.id;

  // Count prior visits for this plate
  const {count:priorCount}=await _sb.from('visits').select('id',{count:'exact',head:true})
    .eq('merchant_id',uid).eq('plate',plate);
  const visitNum=(priorCount||0)+1;

  const visitTime=new Date(date+'T'+time+':00').toISOString();
  const {error}=await _sb.from('visits').insert({
    merchant_id:uid,
    plate, customer_name:custName||null,
    service_type:service, price, discount:0,
    visit_number:visitNum, notes:notes||null,
    created_at:visitTime
  });

  if(error){alert('خطأ: '+error.message);return;}

  document.getElementById('addModal').classList.remove('open');
  ['newCustomer','newCar','newNotes','newPrice'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('newService').value='';
  currentDate=new Date(date+'T00:00:00');
  await loadAppts();
  updateDateLabel();
}

// فلاتر الحالة
document.getElementById('statusFilters').addEventListener('click',e=>{
  const btn=e.target.closest('.sf-btn');
  if(!btn)return;
  document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentStatus=btn.dataset.status;
  render();
});

// إغلاق المودال
document.querySelectorAll('.modal-bg').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')});
});

// تهيئة
updateDateLabel();

(async()=>{
  await requireAuth();
  fillSidebarUser();
  await loadAppts();
})();
</script>
<script src="mobile-init.js"></script>
  <script src="brand.js"></script>
</body>
</html>
