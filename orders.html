<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الطلبات — VOLD MOTOR</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .kboard{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
  .kcol{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:12px;min-height:120px;transition:.15s}
  .kcol.over{border-color:var(--violet);background:var(--violet-soft);box-shadow:0 0 0 3px rgba(37,99,235,.10)}
  .kcol-head{display:flex;align-items:center;gap:8px;margin:2px 4px 12px}
  .kcol-dot{width:10px;height:10px;border-radius:50%;flex:none}
  .kcol-title{font-weight:900;font-size:.95rem;color:var(--ink)}
  .kcol-count{margin-inline-start:auto;background:var(--paper);border:1px solid var(--line);border-radius:20px;font-size:.74rem;font-weight:800;color:var(--muted);padding:2px 9px}
  .kcol-body{display:flex;flex-direction:column;gap:10px;min-height:60px}
  .kcard{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:13px;box-shadow:0 1px 2px rgba(16,24,40,.04);cursor:grab;transition:.15s}
  .kcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
  .kcard.dragging{opacity:.45}
  .kcard-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
  .kplate{display:inline-flex;align-items:center;gap:6px;font-weight:900;font-size:1rem;letter-spacing:.06em;color:#0f172a;background:#fff;border:2px solid #0f172a;border-radius:7px;padding:3px 10px;direction:ltr}
  .ktime{font-size:.72rem;font-weight:800;color:var(--muted);background:var(--bg);border-radius:20px;padding:3px 9px;white-space:nowrap}
  .ktime.late{color:#b42318;background:#fee4e2}
  .kcar{font-weight:800;font-size:.95rem;color:var(--ink);margin-bottom:3px}
  .kcust{font-size:.83rem;color:var(--muted);display:flex;align-items:center;gap:6px}
  .ksvc{font-size:.76rem;font-weight:800;color:var(--violet);background:var(--violet-soft);padding:2px 9px;border-radius:6px;margin-top:8px;display:inline-block}
  .kbtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:11px;border:0;border-radius:10px;color:#fff;font-family:inherit;font-weight:800;font-size:.9rem;padding:11px;cursor:pointer;transition:.12s;min-height:44px}
  .kbtn:active{transform:scale(.99)}
  .kempty{text-align:center;color:var(--muted);font-size:.82rem;padding:18px 6px}
  .kmob-tabs{display:none}
  @media(max-width:860px){
    .kboard{grid-template-columns:1fr;gap:12px}
    .kcol{background:var(--paper)}
    .kcard{cursor:default}
    .kmob-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px}
    .kmob-tabs::-webkit-scrollbar{display:none}
    .kmob-tabs button{flex:none;border:1px solid var(--line);background:var(--paper);color:var(--muted);font-family:inherit;font-size:.82rem;font-weight:800;padding:8px 15px;border-radius:20px;white-space:nowrap;min-height:44px;cursor:pointer}
    .kmob-tabs button.active{background:var(--violet);color:#fff;border-color:var(--violet)}
  }
  /* modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(26,19,64,.45);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--paper);border-radius:22px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0}
  .modal-head h3{font-size:1.2rem;font-weight:800;color:var(--ink)}
  .modal-close{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--line);background:var(--paper);display:grid;place-items:center;cursor:pointer;color:var(--muted)}
  .modal-body{padding:18px 24px 24px}
  .ofield{margin-bottom:13px}
  .ofield label{display:block;font-size:.82rem;font-weight:800;color:var(--ink);margin-bottom:6px}
  .ofield input,.ofield select{width:100%;box-sizing:border-box;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font-family:inherit;font-size:.95rem;color:var(--ink);background:var(--paper);outline:0}
  .ofield-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .o-err{display:none;background:#fee4e2;color:#b42318;border-radius:10px;padding:9px 12px;font-size:.85rem;font-weight:700;margin-bottom:12px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="roles.js"></script>
<script src="orders.js"></script>
<script src="supabase-client.js"></script>
<script src="lang.js" defer></script>
</head>
<body>
<div class="app-layout">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo" style="display:flex;align-items:center;gap:9px;direction:ltr;justify-content:flex-start"></div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <a href="dashboard.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> <span>لوحة التحكم</span></a>
      <a href="orders.html" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> <span>الطلبات</span></a>
      <a href="appointments.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> <span>الحجوزات</span></a>
      <a href="customers.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> <span>العملاء</span></a>
      <a href="inventory.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg> <span>المخزون</span></a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">الإدارة</div>
      <a href="reports.html" class="nav-item" data-role-deny="technician"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg> <span>التقارير</span></a>
      <a href="team.html" class="nav-item" data-role-deny="technician"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> <span>الفريق</span></a>
      <a href="settings.html" class="nav-item" data-role-deny="technician"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> <span>الإعدادات</span></a>
    </div>
  </nav>
  <div class="sidebar-user"><div class="avatar" id="sb-avatar" style="background:var(--violet)">م</div>
    <div class="info"><b id="sb-name">...</b><span>VOLD MOTOR</span></div><a href="#" onclick="doLogout();return false;" title="خروج"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7a7875" stroke-width="2.2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div>
</aside>

<div class="main-area">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="burger-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <span class="topbar-title">الطلبات</span>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-violet btn-sm" data-role-deny="technician" onclick="openNew()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> <span>طلب جديد</span></button>
    </div>
  </div>

  <div class="page-content">
    <!-- mobile status filter -->
    <div class="kmob-tabs" id="kmob-tabs"></div>
    <div class="kboard" id="kboard"><div class="kempty" style="grid-column:1/-1">جاري التحميل…</div></div>
  </div>
</div>
</div>

<!-- New order modal -->
<div class="modal-bg" id="newModal">
  <div class="modal">
    <div class="modal-head"><h3>طلب جديد</h3><button class="modal-close" onclick="closeNew()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="o-err" id="o-err"></div>
      <div class="ofield"><label>رقم اللوحة *</label><input id="o-plate" placeholder="أ ب ج 1234"></div>
      <div class="ofield-row">
        <div class="ofield"><label>نوع السيارة (الماركة)</label><input id="o-make" placeholder="تويوتا"></div>
        <div class="ofield"><label>الموديل</label><input id="o-model" placeholder="كامري 2022"></div>
      </div>
      <div class="ofield-row">
        <div class="ofield"><label>اسم العميل</label><input id="o-cname" placeholder="اسم العميل"></div>
        <div class="ofield"><label>جوال العميل</label><input id="o-cphone" type="tel" dir="ltr" style="text-align:right" placeholder="05xxxxxxxx"></div>
      </div>
      <div class="ofield-row">
        <div class="ofield"><label>الخدمة</label><input id="o-svc" placeholder="غسيل / تغيير زيت..."></div>
        <div class="ofield"><label>إسناد لفنّي</label><select id="o-assign"><option value="">— بدون إسناد —</option></select></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px">
        <button class="btn btn-ghost" onclick="closeNew()">إلغاء</button>
        <button class="btn btn-violet" id="o-save" onclick="createOrder(this)">إضافة الطلب</button>
      </div>
    </div>
  </div>
</div>

<script>
const _sb = window._supabase;
let CENTER_ID, MY_UID, ROLE='owner', ORDERS=[], WORKERS=[], MOB_FILTER='pending';
const FLOW = window.VM_ORDER_FLOW, META = window.VM_ORDER_META, STAMP = window.VM_ORDER_STAMP;

async function requireAuth(){ const {data:{session}}=await _sb.auth.getSession(); if(!session){location.href='login.html?mode=login';return null;} return session; }
function doLogout(){ _sb.auth.signOut().then(()=>location.href='login.html?mode=login'); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isMobile(){ return window.innerWidth <= 860; }

async function loadWorkers(){
  try{ const {data}=await _sb.from('workers').select('user_id,email,full_name,status,role').eq('center_id',CENTER_ID); WORKERS=(data||[]).filter(w=>w.status!=='inactive'&&w.user_id); }catch(e){ WORKERS=[]; }
  const sel=document.getElementById('o-assign');
  if(sel) sel.innerHTML='<option value="">— بدون إسناد —</option>'+WORKERS.map(w=>`<option value="${esc(w.user_id)}">${esc(w.full_name||w.email)}${w.role==='manager'?' (مشرف)':''}</option>`).join('');
}

// Active branch shared with the global switcher (localStorage + 'vm:branch-change')
function activeBranch(){ try{ return localStorage.getItem('vm_active_branch')||'all'; }catch(e){ return 'all'; } }
window.addEventListener('vm:branch-change', ()=>loadOrders());

async function loadOrders(){
  try{
    const branch=activeBranch();
    let q=_sb.from('orders').select('*').eq('merchant_id',CENTER_ID);
    if(ROLE==='technician') q=q.eq('assigned_to',MY_UID);
    if(branch!=='all') q=q.eq('branch_id',branch);
    q=q.order('created_at',{ascending:true});
    const {data,error}=await q; if(error)throw error; ORDERS=data||[];
  }catch(e){ ORDERS=[]; }
  render();
}

function cardHTML(o, draggable){
  const m=META[o.status]||META.pending;
  const el=window.vmOrderElapsed(o.started_at||o.created_at);
  const car=[o.car_make,o.car_model].filter(Boolean).join(' ')||'—';
  const next=m.next;
  const canAct = (ROLE==='owner'||ROLE==='manager') || (ROLE==='technician' && o.assigned_to===MY_UID);
  const actBtn = (next && canAct) ? `<button class="kbtn" style="background:${m.actionColor}" onclick="advance('${o.id}')">${m.actionAr}
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>` : '';
  return `<div class="kcard${draggable?'':''}" ${draggable?'draggable="true"':''} data-id="${o.id}" data-status="${o.status}"
      ondragstart="onDragStart(event)" ondragend="onDragEnd(event)">
    <div class="kcard-top">
      <span class="kplate">${esc(o.plate||'—')}</span>
      <span class="ktime${el.late?' late':''}">${el.text}${el.late?' ⚠':''}</span>
    </div>
    <div class="kcar">${esc(car)}</div>
    ${o.customer_name?`<div class="kcust"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${esc(o.customer_name)}</div>`:''}
    ${o.service_type?`<span class="ksvc">${esc(o.service_type)}</span>`:''}
    ${actBtn}
  </div>`;
}

function render(){
  const board=document.getElementById('kboard');
  const tabs=document.getElementById('kmob-tabs');
  const mob=isMobile();
  const draggable = !mob && (ROLE==='owner'||ROLE==='manager');

  if(mob){
    // mobile: tabs + single filtered list of action cards
    tabs.innerHTML=FLOW.map(s=>`<button class="${s===MOB_FILTER?'active':''}" onclick="setMobFilter('${s}')">${META[s].ar} (${ORDERS.filter(o=>o.status===s).length})</button>`).join('');
    const list=ORDERS.filter(o=>o.status===MOB_FILTER);
    board.style.display='block';
    board.innerHTML = list.length ? list.map(o=>cardHTML(o,false)).join('') : `<div class="kempty">لا توجد طلبات في «${META[MOB_FILTER].ar}»</div>`;
    return;
  }
  // desktop: 4 columns
  tabs.innerHTML='';
  board.style.display='grid';
  board.innerHTML = FLOW.map(s=>{
    const items=ORDERS.filter(o=>o.status===s);
    return `<div class="kcol" data-status="${s}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <div class="kcol-head"><span class="kcol-dot" style="background:${META[s].accent}"></span><span class="kcol-title">${META[s].ar}</span><span class="kcol-count">${items.length}</span></div>
      <div class="kcol-body">${items.length?items.map(o=>cardHTML(o,draggable)).join(''):'<div class="kempty">لا طلبات</div>'}</div>
    </div>`;
  }).join('');
}
function setMobFilter(s){ MOB_FILTER=s; render(); }

/* ── Drag & drop (desktop) ── */
let _dragId=null;
function onDragStart(e){ _dragId=e.currentTarget.dataset.id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',_dragId);}catch(_){}}
function onDragEnd(e){ e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.kcol.over').forEach(c=>c.classList.remove('over')); }
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add('over'); e.dataTransfer.dropEffect='move'; }
function onDragLeave(e){ e.currentTarget.classList.remove('over'); }
function onDrop(e){ e.preventDefault(); e.currentTarget.classList.remove('over'); const id=_dragId||e.dataTransfer.getData('text/plain'); const status=e.currentTarget.dataset.status; if(id&&status) setStatus(id,status); }

/* ── Status transitions ── */
async function advance(id){ const o=ORDERS.find(x=>x.id===id); if(!o) return; const nx=META[o.status]?.next; if(nx) setStatus(id,nx); }
async function setStatus(id, status){
  const o=ORDERS.find(x=>x.id===id); if(!o||o.status===status||!window.vmOrderValid(status)) return;
  const patch={ status, updated_at:new Date().toISOString() };
  if(STAMP[status]) patch[STAMP[status]]=new Date().toISOString();
  // optimistic
  const prev=o.status; o.status=status; render();
  const {error}=await _sb.from('orders').update(patch).eq('id',id);
  if(error){ o.status=prev; render(); alert('تعذّر تحديث الحالة: '+error.message); return; }
  // Notification hook → fires on READY / COMPLETED
  if(status==='ready'||status==='completed') window.triggerCustomerNotification(id, status);
}

/* ── Create order ── */
function openNew(){ document.getElementById('o-err').style.display='none'; ['o-plate','o-make','o-model','o-cname','o-cphone','o-svc'].forEach(i=>document.getElementById(i).value=''); document.getElementById('o-assign').value=''; document.getElementById('newModal').classList.add('open'); }
function closeNew(){ document.getElementById('newModal').classList.remove('open'); }
async function createOrder(btn){
  const err=document.getElementById('o-err'); err.style.display='none';
  const plate=document.getElementById('o-plate').value.trim();
  if(!plate){ err.textContent='رقم اللوحة مطلوب'; err.style.display='block'; return; }
  const row={
    merchant_id:CENTER_ID, plate,
    car_make:document.getElementById('o-make').value.trim()||null,
    car_model:document.getElementById('o-model').value.trim()||null,
    customer_name:document.getElementById('o-cname').value.trim()||null,
    customer_phone:document.getElementById('o-cphone').value.trim()||null,
    service_type:document.getElementById('o-svc').value.trim()||null,
    assigned_to:document.getElementById('o-assign').value||null,
    status:'pending',
    branch_id: activeBranch()==='all' ? null : activeBranch(),  // null → DB trigger assigns primary
  };
  btn.disabled=true; const t=btn.textContent; btn.textContent='جاري الإضافة...';
  const {error}=await _sb.from('orders').insert(row);
  btn.disabled=false; btn.textContent=t;
  if(error){ err.textContent='تعذّر الإضافة: '+error.message; err.style.display='block'; return; }
  closeNew(); await loadOrders();
}

document.getElementById('newModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeNew(); });
let _rt; window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(render,200); });

/* ── Boot ── */
(async()=>{
  const session=await requireAuth(); if(!session) return;
  MY_UID=session.user.id;
  const meta=session.user.user_metadata||{};
  ROLE=window.vmRoleOf?window.vmRoleOf(meta.role):'owner';
  CENTER_ID = (ROLE==='owner') ? MY_UID : (meta.center_id || MY_UID);
  if(window.vmApplyRoleGuards) window.vmApplyRoleGuards(ROLE);
  const name=meta.shop_name||meta.center_name||meta.full_name||session.user.email||'';
  document.getElementById('sb-name').textContent=name;
  document.getElementById('sb-avatar').textContent=(name.charAt(0)||'م');
  if(ROLE==='owner'||ROLE==='manager') loadWorkers();
  await loadOrders();
  // gentle auto-refresh of "time elapsed" tags
  setInterval(()=>{ if(document.visibilityState==='visible') render(); }, 60000);
})();
</script>
<script src="mobile-init.js"></script>
<script src="brand.js"></script>
</body>
</html>
