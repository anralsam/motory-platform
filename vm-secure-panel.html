<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VOLD MOTOR</title>
<!-- NO index, NO follow — يمنع ظهور هذه الصفحة في Google -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563eb; --blue-soft:rgba(37,99,235,.1);
  --ink:#09090b; --muted:#71717a;
  --paper:#fff; --bg:#f9f9f9; --line:#e4e4e7;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Almarai',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;direction:rtl}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}

.card{
  background:var(--paper); border:1px solid var(--line);
  border-radius:20px; padding:40px 36px;
  width:100%; max-width:400px;
  box-shadow:0 8px 32px rgba(0,0,0,.07);
  animation:up .35s ease;
}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.logo{
  display:flex; align-items:center; gap:10px;
  margin-bottom:32px; justify-content:center;
  font-family:'Courier New',monospace;
}
.logo-mark{
  width:40px;height:40px;border-radius:11px;
  background:var(--blue);display:grid;place-items:center;flex:none;
}
.logo-text{font-size:1.15rem;font-weight:800;letter-spacing:.04em;color:var(--ink)}
.logo-text span{color:var(--blue)}

h2{font-size:1.55rem;font-weight:900;color:var(--ink);margin-bottom:5px;text-align:center;letter-spacing:-.02em}
.sub{font-size:.9rem;color:var(--muted);font-weight:600;text-align:center;margin-bottom:28px}

.field{margin-bottom:16px}
.field label{display:block;font-size:.84rem;font-weight:700;color:var(--ink);margin-bottom:7px}
.inp-wrap{position:relative}
.ico{position:absolute;top:50%;transform:translateY(-50%);right:14px;color:var(--muted);pointer-events:none}
input[type=email],input[type=password]{
  width:100%;padding:13px 42px 13px 42px;
  border:1.5px solid var(--line);border-radius:12px;
  font-family:inherit;font-size:.95rem;color:var(--ink);
  background:var(--bg);outline:0;
  transition:border-color .15s,background .15s;
  direction:ltr;text-align:right;
}
input:focus{border-color:var(--blue);background:var(--paper);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
input::placeholder{color:#bbb}
.eye{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  background:none;border:0;cursor:pointer;color:var(--muted);padding:2px;
  font-family:inherit;
}
.eye:hover{color:var(--blue)}

.err{
  background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c;
  border-radius:10px;padding:11px 14px;
  font-size:.88rem;font-weight:700;
  margin-bottom:14px;display:none;
  animation:up .2s ease;
}

.btn{
  width:100%;padding:14px;border-radius:12px;border:0;
  font-family:inherit;font-size:1rem;font-weight:800;
  background:var(--blue);color:#fff;cursor:pointer;
  box-shadow:0 6px 22px rgba(37,99,235,.3);
  transition:.2s;margin-top:4px;
}
.btn:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 10px 28px rgba(37,99,235,.38)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.back-link{
  display:block;text-align:center;
  font-size:.84rem;font-weight:700;color:var(--muted);
  margin-top:20px;text-decoration:none;transition:color .15s;
}
.back-link:hover{color:var(--ink)}

/* Success state */
.success{text-align:center;padding:16px 0;display:none}
.success-icon{
  width:68px;height:68px;border-radius:50%;
  background:#dcfce7;display:grid;place-items:center;
  margin:0 auto 16px;
}
.success h3{font-size:1.3rem;font-weight:900;color:var(--ink);margin-bottom:6px}
.success p{font-size:.9rem;color:var(--muted);font-weight:600}

/* Rate limit visual */
.attempts-bar{
  display:flex;gap:5px;justify-content:center;margin-top:12px;
}
.att-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--line);transition:.3s;
}
.att-dot.used{background:#ef4444}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
</head>
<body>

<a href="index.html" style="position:fixed;top:16px;right:16px;display:inline-flex;align-items:center;gap:7px;font-size:.85rem;font-weight:700;color:#6b7280;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:7px 14px;text-decoration:none;transition:.15s;font-family:'Almarai',sans-serif;z-index:10" onmouseover="this.style.color='#2563eb';this.style.borderColor='#2563eb';this.style.background='rgba(37,99,235,.06)'" onmouseout="this.style.color='#6b7280';this.style.borderColor='#e5e7eb';this.style.background='#fff'">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  الرئيسية
</a>

<div class="card">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 48 48" fill="none">
        <path d="M6 10 L24 42 L42 10" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-text">VOLD <span>MOTOR</span></span>
  </div>

  <!-- Login form -->
  <div id="login-form">
    <h2>دخول آمن</h2>
    <p class="sub">الوصول مقيّد · إداري فقط</p>

    <div class="err" id="err-box"></div>

    <div class="field">
      <label>البريد الإلكتروني</label>
      <div class="inp-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="f-email" placeholder="name@voldmotor.com"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>

    <div class="field">
      <label>كلمة المرور</label>
      <div class="inp-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="f-pass" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button class="eye" type="button" onclick="togglePass(this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn" id="login-btn" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" style="display:inline;vertical-align:middle;margin-left:6px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      دخول آمن
    </button>

    <!-- Attempt dots (rate-limit visual) -->
    <div class="attempts-bar" id="att-bar" style="display:none">
      <div class="att-dot" id="att1"></div>
      <div class="att-dot" id="att2"></div>
      <div class="att-dot" id="att3"></div>
    </div>

    <a href="login.html" class="back-link">
      ← العودة للموقع الرئيسي
    </a>
  </div>

  <!-- Success state -->
  <div class="success" id="success-state">
    <div class="success-icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.8" stroke-linecap="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>
    <h3>تم التحقق ✓</h3>
    <p>جاري الانتقال للوحة الإدارة...</p>
  </div>

</div>

<script>
let _attempts = 0;
const MAX_ATTEMPTS = 3;
let _locked = false;
let _lockTimer = null;

function togglePass(btn) {
  const inp = document.getElementById('f-pass');
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.innerHTML = isText
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
}

function showErr(msg) {
  const el = document.getElementById('err-box');
  el.textContent = msg;
  el.style.display = 'block';
}

function updateDots() {
  document.getElementById('att-bar').style.display = 'flex';
  for(let i=1;i<=3;i++){
    const d = document.getElementById(`att${i}`);
    d.classList.toggle('used', i <= _attempts);
  }
}

async function doLogin() {
  if(_locked) return;

  const email = document.getElementById('f-email').value.trim();
  const pass  = document.getElementById('f-pass').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('err-box');

  errEl.style.display = 'none';

  if(!email || !pass) { showErr('أدخل البريد وكلمة المرور'); return; }

  btn.textContent = 'جاري التحقق...';
  btn.disabled = true;

  const { error } = await _sb.auth.signInWithPassword({ email, password: pass });

  if(error) {
    _attempts++;
    updateDots();
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" style="display:inline;vertical-align:middle;margin-left:6px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> دخول آمن`;

    const msg = error.message.includes('Invalid')
      ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة'
      : error.message;

    showErr(msg);

    if(_attempts >= MAX_ATTEMPTS) {
      _locked = true;
      let secs = 30;
      btn.disabled = true;
      const tick = setInterval(() => {
        btn.textContent = `🔒 انتظر ${secs--} ثانية`;
        if(secs < 0) {
          clearInterval(tick);
          _locked = false;
          _attempts = 0;
          btn.disabled = false;
          btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" style="display:inline;vertical-align:middle;margin-left:6px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> دخول آمن`;
          errEl.style.display = 'none';
          document.getElementById('att-bar').style.display = 'none';
          [1,2,3].forEach(i => document.getElementById(`att${i}`).classList.remove('used'));
        }
      }, 1000);
    }
    return;
  }

  // ✅ Success
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('success-state').style.display = 'block';
  setTimeout(() => { window.location.href = 'vm-control-center.html'; }, 1200);
}

// Check if already logged in → skip login
(async () => {
  const { data: { session } } = await _sb.auth.getSession();
  if(session) {
    window.location.href = 'vm-control-center.html';
  }
})();
</script>
  <script src="brand.js"></script>
</body>
</html>
